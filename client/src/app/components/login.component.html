<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200 dark:from-slate-950 dark:via-slate-900 dark:to-black p-6">

  <div class="grid w-full max-w-6xl overflow-hidden rounded-[32px] bg-white dark:bg-slate-900 shadow-2xl lg:grid-cols-2">

    <!-- LEFT SIDE -->
    <div class="hidden lg:flex flex-col items-center justify-center bg-slate-900 p-16 text-white">

      <!-- LOGO -->
      <div
        class="flex h-24 w-24 items-center justify-center rounded-[28px] bg-gradient-to-br from-indigo-500 via-blue-600 to-cyan-500 text-5xl shadow-2xl shadow-blue-500/30"
      >
        📦
      </div>

      <h1 class="mt-8 text-5xl font-black">
        Inventory MS
      </h1>

      <p class="mt-6 max-w-md text-center text-lg leading-relaxed text-slate-300">

        Track products, monitor inventory,
        manage stock levels, and streamline
        your business operations efficiently.

      </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="flex items-center justify-center p-10">

      <div class="w-full max-w-md">

        <!-- MOBILE LOGO -->
        <div class="mb-8 flex justify-center lg:hidden">

          <div
            class="flex h-20 w-20 items-center justify-center rounded-[24px] bg-gradient-to-br from-indigo-500 via-blue-600 to-cyan-500 text-4xl text-white shadow-xl"
          >
            📦
          </div>

        </div>

        <!-- TITLE -->
        <h2 class="text-4xl font-black text-slate-900 dark:text-white">
          Welcome Back
        </h2>

        <p class="mt-2 text-slate-500 dark:text-slate-400">
          Sign in to continue to your dashboard
        </p>

        <!-- FORM -->
        <form
          (ngSubmit)="login()"
          class="mt-8 space-y-6"
        >

          <!-- EMAIL -->
          <div>

            <label class="mb-2 block text-sm font-bold text-slate-700 dark:text-slate-200">
              Email
            </label>

            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              required
              autocomplete="email"
              placeholder="Enter your email"
              class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-5 py-4 outline-none transition focus:border-indigo-600 focus:bg-white dark:border-slate-700 dark:bg-slate-800 dark:text-white"
            />

          </div>

          <!-- PASSWORD -->
          <div>

            <div class="mb-2 flex items-center justify-between">

              <label class="text-sm font-bold text-slate-700 dark:text-slate-200">
                Password
              </label>

              <!-- FORGOT -->
              <a
                routerLink="/forgot-password"
                class="text-sm font-semibold text-indigo-600 transition hover:text-indigo-800 dark:text-indigo-400"
              >
                Forgot Password?
              </a>

            </div>

            <!-- PASSWORD WRAPPER -->
            <div class="relative">

              <input
                [type]="showPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                name="password"
                required
                autocomplete="current-password"
                placeholder="Enter your password"
                class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-5 py-4 pr-16 outline-none transition focus:border-indigo-600 focus:bg-white dark:border-slate-700 dark:bg-slate-800 dark:text-white"
              />

              <!-- TOGGLE -->
              <button
                type="button"
                (click)="togglePassword()"
                class="absolute right-5 top-1/2 -translate-y-1/2 text-xl text-slate-500 transition hover:text-indigo-600"
              >

                <span *ngIf="!showPassword">
                  👁️
                </span>

                <span *ngIf="showPassword">
                  🙈
                </span>

              </button>

            </div>

          </div>

          <!-- BUTTON -->
          <button
            type="submit"
            [disabled]="isLoading"
            class="w-full rounded-2xl bg-gradient-to-r from-indigo-500 to-purple-600 py-4 text-xl font-black text-white shadow-xl transition hover:scale-[1.02] hover:from-indigo-600 hover:to-purple-700 disabled:cursor-not-allowed disabled:opacity-60"
          >

            <span *ngIf="!isLoading">
              Sign In
            </span>

            <span *ngIf="isLoading">
              Loading...
            </span>

          </button>

          <!-- ERROR -->
          <div
            *ngIf="errorMessage"
            class="rounded-2xl border border-red-200 bg-red-100 p-4 text-center font-semibold text-red-700"
          >

            {{ errorMessage }}

          </div>

        </form>

        <!-- SIGN UP -->
        <div class="mt-8 text-center">

          <span class="text-slate-500 dark:text-slate-400">
            Don't have an account?
          </span>

          <a
            routerLink="/register"
            class="ml-2 font-bold text-indigo-600 transition hover:text-indigo-800 dark:text-indigo-400"
          >
            Create Account
          </a>

        </div>

      </div>

    </div>

  </div>

</div>
