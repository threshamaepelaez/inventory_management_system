<div class="max-w-7xl mx-auto">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-6">

    <!-- LEFT -->
    <div class="flex items-center gap-4">

      <button
  type="button"
  routerLink="/products"
  class="inline-flex items-center gap-2 rounded-2xl border border-slate-300 bg-white px-5 py-3 font-bold text-slate-800 shadow-md transition duration-200 hover:scale-105 hover:bg-slate-100 active:scale-95"
>
  ← Back to Products
</button>
      <div>

        <h1
          class="text-3xl font-black text-slate-800"
        >
          Products
        </h1>

        <p
          class="text-sm text-slate-400"
        >
          Inventory product list
        </p>

      </div>

    </div>

  </div>

  <!-- SEARCH -->
  <div
    class="mb-6 rounded-2xl bg-white p-4 shadow-sm"
  >

    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="searchProducts()"
      placeholder="Search product or category..."
      class="w-full rounded-2xl border px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500"
    />

  </div>

  <!-- LOADING -->
  <div
    *ngIf="loading"
    class="rounded-2xl bg-white p-10 text-center shadow-sm"
  >

    Loading products...

  </div>

  <!-- ERROR -->
  <div
    *ngIf="error"
    class="rounded-2xl bg-red-100 p-4 text-red-600 shadow-sm"
  >

    {{ error }}

  </div>

  <!-- PRODUCTS -->
  <div
    *ngIf="!loading && !error"
    class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3"
  >

    <div
      *ngFor="let product of filteredProducts"
      class="overflow-hidden rounded-3xl bg-white shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-xl"
    >

      <!-- IMAGE -->
      <img
        *ngIf="product.image"
        [src]="product.image"
        class="h-52 w-full object-cover"
      />

      <!-- CONTENT -->
      <div class="p-5">

        <!-- CATEGORY -->
        <div
          class="mb-3 inline-block rounded-full bg-indigo-100 px-3 py-1 text-xs font-bold text-indigo-600"
        >
          {{ product.category || 'General' }}
        </div>

        <!-- NAME -->
        <h2
          class="text-2xl font-black text-slate-800"
        >
          {{ product.name }}
        </h2>

        <!-- DESCRIPTION -->
        <p
          class="mt-2 line-clamp-2 text-sm text-slate-500"
        >
          {{ product.description }}
        </p>

        <!-- PRICE -->
        <div
          class="mt-5 flex items-center justify-between"
        >

          <h3
            class="text-2xl font-black text-indigo-600"
          >
            ₱{{ product.price | number:'1.2-2' }}
          </h3>

          <span
            class="rounded-xl bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-600"
          >
            Qty:
            {{ product.quantity }}
          </span>

        </div>

      </div>

    </div>

  </div>

</div>
