<div class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 p-6">
  <div class="w-full max-w-lg rounded-3xl bg-white dark:bg-slate-800 p-10 shadow-2xl">

    <!-- TITLE -->
    <h1 class="text-4xl font-black text-slate-800 dark:text-white">
      Create Account
    </h1>

    <p class="mt-2 text-slate-500 dark:text-slate-400">
      Register to continue
    </p>

    <!-- FORM -->
    <form (ngSubmit)="register()" class="mt-8 space-y-6">

      <!-- FULL NAME -->
      <div>
        <label
          for="name"
          class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-200"
        >
          Full Name
        </label>

        <input
          id="name"
          type="text"
          [(ngModel)]="name"
          name="name"
          required
          class="w-full rounded-xl bg-slate-100 dark:bg-slate-700 px-5 py-4 outline-none text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <!-- EMAIL -->
      <div>
        <label
          for="email"
          class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-200"
        >
          Email
        </label>

        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full rounded-xl bg-slate-100 dark:bg-slate-700 px-5 py-4 outline-none text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <!-- PASSWORD -->
      <div class="relative">
        <label
          for="password"
          class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-200"
        >
          Password
        </label>

        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full rounded-xl bg-slate-100 dark:bg-slate-700 px-5 py-4 pr-14 outline-none text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500"
        />

        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute right-4 top-[45px] text-xl text-slate-400 hover:text-indigo-500 focus:outline-none"
        >
          <span *ngIf="!showPassword">👁️</span>
          <span *ngIf="showPassword">🙈</span>
        </button>
      </div>

      <!-- ROLE -->
      <div>
        <label
          for="role"
          class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-200"
        >
          Role
        </label>

        <select
          id="role"
          [(ngModel)]="role"
          name="role"
          class="w-full rounded-xl bg-slate-100 dark:bg-slate-700 px-5 py-4 outline-none text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500"
        >
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        [disabled]="loading"
        class="mt-6 w-full rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 py-4 text-xl font-bold text-white shadow-lg transition hover:scale-105 disabled:opacity-60"
      >
        <span *ngIf="!loading">Register</span>
        <span *ngIf="loading">Loading...</span>
      </button>

      <!-- ERROR -->
      <div
        *ngIf="error"
        class="rounded-xl bg-red-100 py-3 text-center text-red-600 font-semibold"
      >
        {{ error }}
      </div>

    </form>

    <!-- FOOTER -->
    <div class="mt-8 text-center">
      <span class="text-slate-500 dark:text-slate-400">
        Already have an account?
      </span>

      <a
        routerLink="/login"
        class="ml-2 text-indigo-600 font-bold hover:underline"
      >
        Sign In
      </a>
    </div>

  </div>
</div>
