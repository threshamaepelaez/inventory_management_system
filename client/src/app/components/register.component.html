
<div class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 p-6">
	<div class="w-full max-w-lg rounded-3xl bg-white dark:bg-slate-800 p-10 shadow-2xl">
		<h1 class="text-4xl font-black text-slate-800 dark:text-white">Create Account</h1>
		<p class="mt-2 text-slate-500 dark:text-slate-400">Register to continue</p>
		<form (ngSubmit)="register()" class="mt-8 space-y-6">
			<div>
				<label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-200">Full Name</label>
				<input type="text" [(ngModel)]="name" name="name" required class="w-full rounded-xl bg-slate-100 dark:bg-slate-700 px-5 py-4 outline-none text-slate-900 dark:text-white" />
			</div>
			<div>
				<label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-200">Email</label>
				<input type="email" [(ngModel)]="email" name="email" required class="w-full rounded-xl bg-slate-100 dark:bg-slate-700 px-5 py-4 outline-none text-slate-900 dark:text-white" />
			</div>
			<div class="relative">
				<label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-200">Password</label>
				<input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required class="w-full rounded-xl bg-slate-100 dark:bg-slate-700 px-5 py-4 outline-none text-slate-900 dark:text-white pr-12" />
				<button type="button" (click)="showPassword = !showPassword" class="absolute right-4 top-10 text-xl text-slate-400 hover:text-indigo-500 focus:outline-none">
					<span *ngIf="!showPassword">👁️</span>
					<span *ngIf="showPassword">🙈</span>
				</button>
			</div>
			<button type="submit" [disabled]="loading" class="mt-6 w-full rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 py-4 text-xl font-bold text-white shadow-lg transition hover:scale-105 disabled:opacity-60">
				<span *ngIf="!loading">Register</span>
				<span *ngIf="loading">Loading...</span>
			</button>
			<div *ngIf="error" class="mt-4 text-red-500 text-center font-semibold">{{ error }}</div>
		</form>
		<div class="mt-8 text-center">
			<span class="text-slate-500 dark:text-slate-400">Already have an account?</span>
			<a routerLink="/login" class="ml-2 text-indigo-600 font-bold hover:underline">Sign In</a>
		</div>
	</div>
</div>
